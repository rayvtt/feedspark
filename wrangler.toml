name = "feedspark"
main = "cloudflare/feedspark-deck/src/worker.js"
compatibility_date = "2024-12-01"

# Bundle the deck HTML as a Text module so `import DECK from "...html"` in the worker
# inlines the deck at build time. Push to main -> Cloudflare rebuilds -> new deck live.
rules = [
  { type = "Text", globs = ["**/*.html"], fallthrough = true }
]

# Cron: hourly warm of the live plan-sync cache (KV planlive:<id>) so the Workflow
# dashboard opens instantly with current project-plan rows. The scheduled() handler in
# the worker reads the brand->sheet map the dashboard posts (KV plansheets).
[triggers]
crons = ["0 * * * *"]

# Ray's in-browser copy edits (data-eid patches) live here; they re-overlay client-side.
[[kv_namespaces]]
binding = "EDITS"
id = "d93b5ac576c74f0d8a315c5b92dc8e16"

# Tachyon copilot (/api/claude) reads the Anthropic API key from a Worker SECRET — never
# committed here. Set it once and the copilot goes live with no redeploy:
#   wrangler secret put ANTHROPIC_API_KEY        (run from this repo root)
#   — or Cloudflare dashboard → Workers → feedspark → Settings → Variables → Add secret.
# Until it's set, /api/claude returns a friendly "not connected yet" message and the
# in-dashboard copilot stays usable (it shows the setup step instead of an answer).

# One-time migration (must sit after all top-level keys like `rules`, or TOML folds them
# into this table). The live worker carried an orphaned Durable Object class `Store` that
# was never in this repo — the app is 100% KV-backed (see [[kv_namespaces]] above) — so
# Cloudflare rejected every `wrangler deploy` with "does not export class 'Store'" (code
# 10064). This deletes that unused class so deploys go through. It does NOT touch the EDITS
# KV namespace (a separate store), where all real data lives.
#
# Tag is "v2": Cloudflare already has migration tag "v1" recorded for this script (from
# whatever originally created the Store DO), so a "v1" delete is treated as already-applied
# and skipped. "v2" makes wrangler actually send the delete.
[[migrations]]
tag = "v2"
deleted_classes = ["Store"]
