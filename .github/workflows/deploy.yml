# Deploys the static site (index.html at repo root) to GitHub Pages on every push to main.
# Setup: repo Settings → Pages → Source: "GitHub Actions".
# NOTE: a GitHub Pages URL has no auth gate. This tool contains confidential pricing/client data —
# only use Pages if you accept the URL is reachable by anyone who has it. Prefer Cloudflare Pages
# + Cloudflare Access for a real login gate. Adjust `branches` if your default branch isn't `main`.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
